openapi: 3.1.0
info:
  title: Audit Service API
  version: 0.1.0
  description: |
    Platform audit — tool-calls, installation lifecycle.
    x-erd: cursor-context/docs/erd-and-bounded-contexts.md#9-bc-platform-audit-audit-service
servers:
  - url: http://localhost:8086/v1/audit
    description: локально / platform compose
tags:
  - name: tool-events
  - name: internal
paths:
  /orgs/{orgId}/tool-events:
    get:
      tags: [tool-events]
      summary: Audit Tool Events List
      operationId: auditToolEventsList
      security:
        - bearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspace_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Журнал вызовов инструментов
  /internal/tool-events:
    post:
      tags: [internal]
      summary: Append-only ingest (mcp-gateway / ai-runtime)
      operationId: auditToolEventsIngest
      security: []
      parameters:
        - $ref: '#/components/parameters/AuditInternalKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestToolEventRequest'
      responses:
        '202':
          description: Принято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestToolEventResponse'
        '401':
          description: Неверный internal key
components:
  parameters:
    AuditInternalKey:
      name: X-Audit-Internal-Key
      in: header
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    IngestToolEventRequest:
      type: object
      required: [orgId, eventType, toolName, outcome]
      properties:
        orgId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        installationId:
          type: string
          format: uuid
        eventType:
          type: string
          example: mcp.installation
        toolName:
          type: string
        outcome:
          type: string
          enum: [created, deleted, success, error, denied]
        actorUserId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
    IngestToolEventResponse:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
