services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 3s
      timeout: 3s
      retries: 10

  audit:
    build: .
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: audit
      DB_USER: audit
      DB_PASSWORD: audit
      AUDIT_INTERNAL_API_KEY: dev-internal-key
    depends_on:
      postgres:
        condition: service_healthy
